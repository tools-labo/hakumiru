name: Hacks maintenance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "実行する処理"
        required: true
        default: "build-index"
        type: choice
        options:
          - split
          - build-index
          - split-and-build

permissions:
  contents: write

jobs:
  run-maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run split:hacks-json
        if: ${{ inputs.task == 'split' || inputs.task == 'split-and-build' }}
        run: npm run split:hacks-json

      - name: Run build:hacks-index
        if: ${{ inputs.task == 'build-index' || inputs.task == 'split-and-build' }}
        run: npm run build:hacks-index

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/hacks/records src/data/hacks/generated

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Run hacks maintenance (${{
              inputs.task
            }})"
            git push
          fi
